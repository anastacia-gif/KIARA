<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KIARA — Ropa Americana</title>
  <!-- Favicon / logo en pestaña -->
  <link rel="icon" type="image/png" href="fotos/logo.png">
  <link rel="apple-touch-icon" href="fotos/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <span class="header-tagline">colección actual</span>
      <h1 class="header-logo">KIARA</h1>
      <span class="header-tagline">ropa americana</span>
    </div>
    <div class="header-line"></div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-text">Prendas seleccionadas.<br><em>Estilo sin esfuerzo.</em></p>
  </section>

  <!-- BUSCADOR -->
  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="Buscar prenda, talla…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="search-clear" id="search-clear" aria-label="Limpiar búsqueda">&#10005;</button>
    </div>
    <p class="search-results-count" id="search-count"></p>
  </div>

  <!-- PRODUCTS -->
  <main class="main">
    <div class="section-label">
      <span>— productos disponibles</span>
    </div>
    <div class="grid" id="product-grid">
      <!-- Generado por JS -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 KIARA · Todos los derechos reservados</p>
    <p class="footer-sub">Envíos a todo el país · Consultas por WhatsApp</p>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Vista ampliada">
    <button class="lightbox-close" id="lightbox-close" aria-label="Cerrar">&#10005;</button>
    <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
    <div class="lightbox-content">
      <img class="lightbox-img" id="lightbox-img" src="" alt="" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
